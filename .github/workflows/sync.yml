name: Room Sync

on:
  schedule:
    # Runs at 08:00, 12:00, 16:00 Vienna time (CEST = UTC+2)
    - cron: '0 6,10,14 * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://room.luigitonno.at/api/sync?key=${{ secrets.SYNC_API_KEY }}")
          echo "Response status: $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
